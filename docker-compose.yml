services:
  postgres:
    image: postgres:15
    container_name: gle-postgres
    restart: always
    environment:
      POSTGRES_DB: gle_backend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: gle-backend
    env_file:
      - ./backend/.env
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    ports:
      - "8000:8000"
    restart: always
    depends_on:
      - postgres
    volumes:
      - staticfiles:/app/staticfiles

  frontend:
    build: ./frontend
    container_name: gle-frontend
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: gle-nginx
    ports:
      - "80:80"
      - "443:443"
    restart: always
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - staticfiles:/var/www/staticfiles:ro

volumes:
  staticfiles:
  postgres_data: