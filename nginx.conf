# HTTP → HTTPS redirect
server {
    listen 80;
    server_name grandleagueexpert.com www.grandleagueexpert.com;

    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name grandleagueexpert.com www.grandleagueexpert.com;

    ssl_certificate /etc/letsencrypt/live/grandleagueexpert.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grandleagueexpert.com/privkey.pem;

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/auth/ {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /static/ {
        alias /var/www/staticfiles/;
    }
}